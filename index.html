<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison de Scent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <span class="wordmark">Maison de Scent</span>
      <nav class="tabs" aria-label="Main navigation">
        <button class="tab tab--active" data-tab="catalogue" data-i18n="catalog">Catalogue</button>
        <button class="tab" data-tab="foryou" data-i18n="forYou">For You</button>
      </nav>
      <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">TR</button>
    </div>
  </header>

  <main>
    <!-- Catalogue tab -->
    <section id="tab-catalogue" class="tab-pane tab-pane--active" aria-label="Catalogue">
      <div class="filters" role="search">
        <input
          type="search"
          id="search"
          class="filter-input filter-input--wide"
          data-i18n-placeholder="search"
          placeholder="Search by name, brand or note..."
          aria-label="Search fragrances"
        >
        <select id="filter-gender" class="filter-select" aria-label="Filter by gender">
          <option value="" data-i18n="gender">Gender</option>
        </select>
        <select id="filter-family" class="filter-select" aria-label="Filter by family">
          <option value="" data-i18n="family">Family</option>
        </select>
        <select id="filter-season" class="filter-select" aria-label="Filter by season">
          <option value="" data-i18n="season">Season</option>
        </select>
        <button id="clear-filters" class="btn-ghost" data-i18n="clear">Clear filters</button>
        <span id="result-count" class="result-count" aria-live="polite" aria-atomic="true"></span>
      </div>
      <div id="card-grid" class="card-grid" role="list"></div>
      <p id="no-results" class="no-results hidden" data-i18n="noResults">No fragrances match your filters.</p>
    </section>

    <!-- For You tab -->
    <section id="tab-foryou" class="tab-pane" aria-label="For You" hidden>
      <div class="foryou-layout">
        <div class="foryou-form">
          <h2 class="foryou-heading" data-i18n="forYouTitle">Find your signature</h2>
          <p class="foryou-intro" data-i18n="forYouIntro">Select the notes you love and we'll find your matches.</p>

          <label class="form-label" for="note-search" data-i18n="selectNotes">Choose your favourite notes</label>
          <input
            type="search"
            id="note-search"
            class="filter-input"
            placeholder="Search notes..."
            aria-label="Search notes"
          >

          <div id="note-pool" class="note-pool" role="group" aria-label="Available notes"></div>

          <div class="foryou-prefs">
            <select id="pref-gender" class="filter-select" aria-label="Gender preference">
              <option value=""></option>
            </select>
            <select id="pref-season" class="filter-select" aria-label="Season preference">
              <option value=""></option>
            </select>
          </div>

          <p id="pick-hint" class="hint-text" data-i18n="pickAtLeastOne">Pick at least one note to begin.</p>

          <div class="foryou-actions">
            <button id="get-recs" class="btn-primary" data-i18n="getRecs">Get recommendations</button>
            <button id="reset-foryou" class="btn-ghost hidden" data-i18n="reset">Reset</button>
          </div>
        </div>

        <div id="recs-panel" class="recs-panel" aria-live="polite">
          <div id="recs-results"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div
    id="modal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    hidden
  >
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__box" role="document">
      <button class="modal__close" id="modal-close" aria-label="Close dialog">&times;</button>
      <div id="modal-body" class="modal__body"></div>
    </div>
  </div>

  <footer class="footer" role="contentinfo">
    <p class="footer__attr" data-i18n="dataNote">Educational, non-commercial project. Fragrance data via Kaggle (Fragrantica), CC BY-NC-SA 4.0.</p>
  </footer>

  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="recommend.js"></script>
  <script src="catalogue.js"></script>
  <script src="modal.js"></script>
  <script src="app.js"></script>
</body>
</html>
